<!doctype html>

<html>

	<head>
		<title> Calendar </title>
		<link rel="stylesheet" href = "/static/calendar_design.css">
	</head>
	
	<body>
		<div class="calendar-page">

			<div class="calendar-header">
				<h1>Calendar</h1>
				
				<div class="header-nav">
					<a href = {{ url_for("add_event") }}>
						<button class="add-event-btn">
							+ Add Event
						</button>
					</a>
					
					<a href= {{url_for("homepage")}}>
						<button class="add-event-btn">
							Home
						</button>
					</a>
				</div>
			</div>

			<div class="calendar-layout">

				<aside class="sidebar">

					<h2>Upcoming</h2>

					<div class="event-preview">
						<span class="event-dot meeting"></span>
						Team Meeting
					</div>

					<div class="event-preview">
						<span class="event-dot deadline"></span>
						Project Deadline
					</div>

					<div class="event-preview">
						<span class="event-dot personal"></span>
						Birthday Dinner
					</div>

				</aside>

				<main class="calendar-container">

					<div class="month-bar">
						<a class= "shift_week" href = {{ url_for('display_calendar', offset = offset-1)}}>
							<button>&lt;</button>
						</a>
						<h2>{{ title }}</h2>
						<a class = "shift_week" href = {{ url_for('display_calendar', offset = offset+1)}}>
							<button>&gt;</button>
						</a>
					</div>

					<div class="weekdays">
						<div>Sun</div>
						<div>Mon</div>
						<div>Tue</div>
						<div>Wed</div>
						<div>Thu</div>
						<div>Fri</div>
						<div>Sat</div>
					</div>

					<div class="calendar-grid">
						{% for day in week %}

						<div class="day">

							<div class="day-number">
								{{ day.day }}
							</div>

							{% for event in events.get(day.strftime("%Y-%m-%d"), []) %}

								<div class="event-pill">
									{{ event[0] }}
								</div>

							{% endfor %}

						</div>

						{% endfor %}
					</div>

				</main>

			</div>

		</div>
	</body>

</html>
